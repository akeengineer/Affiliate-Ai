name: Local Secret Guard

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  secret-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block committed env files
        run: |
          if git ls-files | grep -E '(^|/)\.env($|\.)' | grep -v '.env.example'; then
            echo "Do not commit .env files."
            exit 1
          fi

      - name: Scan for obvious secret assignments
        run: |
          pattern='(OPENAI_API_KEY|ANTHROPIC_API_KEY|GEMINI_API_KEY|AWS_SECRET_ACCESS_KEY|OBSIDIAN_LOCAL_REST_API_KEY|GH_TOKEN|GITHUB_TOKEN)=([^[:space:]]+)'
          if grep -RInE "$pattern" . --exclude-dir=.git --exclude='.env.example'; then
            echo "Potential secret found."
            exit 1
          fi
